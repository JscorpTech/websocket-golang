name: Build & Push to Private Registry

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'helm/**'
      - '*.md'

permissions:
  contents: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up QEMU (faqat kerak bo'lsa)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Private Registry
        uses: docker/login-action@v3
        with:
          registry: registry.iprogrammer.uz
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            registry.iprogrammer.uz/botspace/websocket:${{ env.SHORT_SHA }}
            registry.iprogrammer.uz/botspace/websocket:latest

      - name: Update Helm values with new image tag
        run: |
          sed -i "s|tag:.*|tag: \"${{ env.SHORT_SHA }}\"|" helm/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/values.yaml
          git diff --cached --quiet || git commit -m "deploy: update image tag to ${{ env.SHORT_SHA }}"
          git push origin main
